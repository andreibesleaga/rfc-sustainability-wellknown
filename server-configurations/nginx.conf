# Nginx Configuration for /.well-known/sustainability
# Add this to your server block.
# Requires: standard ngx_http_core, ngx_http_headers, ngx_http_limit_req modules.

# --- Rate Limiting (RECOMMENDED — draft §Security) ---
# Define a shared zone (place this in the http {} block, outside server {}).
# Limits dynamic period/granularity queries to 1 request/second per IP, burst 5.
# limit_req_zone $binary_remote_addr zone=sust_limit:10m rate=1r/s;

location = /.well-known/sustainability {
    # Path to your sustainability JSON file
    alias /var/www/metadata/sustainability.json;

    # Mandatory: correct media type (draft §2)
    default_type application/json;

    # Recommended caching: 24-hour max-age for current reports (draft §4)
    add_header Cache-Control "public, max-age=86400" always;

    # Recommended: conditional request support (draft §4)
    # ETag and Last-Modified are sent automatically by nginx for static files.
    # etag on;  # (default: on)

    # Allow aggregators and third-party clients to fetch (CORS)
    add_header Access-Control-Allow-Origin "*" always;

    # Method restriction (draft §2): other methods SHOULD receive
    # 405 Method Not Allowed with an Allow: GET, HEAD header. Note: nginx's
    # add_header is inherited from the parent level ONLY IF the current level
    # defines no add_header of its own (see the nginx docs for add_header) —
    # so setting Allow directly inside this `if` would silently drop the
    # Cache-Control/CORS headers above on the 405 path. Routing through a
    # named location instead keeps every response self-contained.
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }
    error_page 405 = @sustainability_405;

    # Rate limiting (activate by uncommenting — requires limit_req_zone above)
    # limit_req zone=sust_limit burst=5 nodelay;
}

location @sustainability_405 {
    default_type application/json;
    add_header Allow "GET, HEAD" always;
    return 405 '{"error":"method not allowed"}';
}

# --- Historical / long-lived report cache (RECOMMENDED — draft §4) ---
# For archived period responses served from a separate path, use a longer max-age.
# location ~ ^/.well-known/sustainability/archive/ {
#     alias /var/www/metadata/archive/;
#     default_type application/json;
#     add_header Cache-Control "public, max-age=31536000, immutable";
# }

# --- OPTIONAL: dynamic Extended service (target/period/granularity) ---
# The `location` block above serves one static Basic-service document — it
# cannot compute a response for `?target=`/`?period=`/`?granularity=`. To
# support those, reverse-proxy to a real application that implements the
# query semantics — e.g. this repo's publisher/ gateway (or an equivalent
# implementation in any language) — rather than trying to reconstruct that
# logic in nginx config. Replace the static `location` block above with:
#
# location = /.well-known/sustainability {
#     proxy_pass http://127.0.0.1:8080;  # forwards the query string as-is
#     proxy_set_header Host $host;
#     # The gateway already sets Content-Type, Cache-Control, ETag, CORS,
#     # and the correct 405/Allow per request — do not duplicate them here;
#     # nginx passes upstream response headers through unless you add_header
#     # for something the gateway intentionally leaves to you (e.g. HSTS).
# }
#
# Verified (2026-07-09) against this repo's publisher gateway via Apache's
# mod_proxy: query strings pass through, and every upstream header survives
# unmodified — see server-configurations/README.md for the equivalent tested
# Apache block.
