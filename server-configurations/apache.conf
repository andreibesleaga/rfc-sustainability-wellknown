# Apache Configuration for /.well-known/sustainability
# Add this to your virtual host configuration (or .htaccess with AllowOverride FileInfo Headers).
# Requires: mod_headers, mod_alias, mod_rewrite (for rate limiting use mod_ratelimit or a WAF).

# --- Step 1: Map the URI to your JSON file ---
# Alias must be declared outside <Location> blocks.
Alias "/.well-known/sustainability" "/var/www/metadata/sustainability.json"

# A tiny static JSON body for the 405 response (create this file once, content e.g.
# {"error":"method not allowed"} ). This indirection is required: Apache's own
# mod_rewrite-triggered 405 response injects its own (incorrect, "Allow: TRACE")
# Allow header that mod_headers cannot override in place — routing through a real
# ErrorDocument resource is the verified way to control both the body and the
# Allow header value on Apache 2.4. See server-configurations/README.md.
Alias "/sustainability-405.json" "/var/www/metadata/sustainability-405.json"
<Files "sustainability-405.json">
    Header always set Content-Type "application/json"
    Header always set Allow "GET, HEAD"
</Files>

<Location "/.well-known/sustainability">
    # Mandatory: correct media type (draft §2)
    Header set Content-Type "application/json"

    # Recommended caching: 24-hour max-age for current reports (draft §4)
    Header set Cache-Control "public, max-age=86400"

    # Recommended: conditional request support to reduce bandwidth (draft §4)
    # ETag and Last-Modified are generated automatically by Apache for static files.
    # To disable ETag generation (shared hosting), uncomment:
    # FileETag None

    # Allow aggregators and third-party clients to fetch (CORS)
    Header set Access-Control-Allow-Origin "*"

    # Method restriction (draft §2): other methods SHOULD receive
    # 405 Method Not Allowed with an Allow: GET, HEAD header. Verified on
    # Apache/2.4.58: mod_rewrite sets the 405 status; the ErrorDocument
    # indirection (above) supplies the correct headers and a JSON body.
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} !^(GET|HEAD)$
    RewriteRule ^ - [R=405,L]
    ErrorDocument 405 /sustainability-405.json
</Location>

# --- Rate Limiting (RECOMMENDED — draft §Security) ---
# Dynamic period/granularity queries can be resource-intensive.
# Option A: mod_ratelimit (limits bandwidth, not request rate — basic protection)
# <Location "/.well-known/sustainability">
#     SetOutputFilter RATE_LIMIT
#     SetEnv rate-limit 400
# </Location>
#
# Option B: mod_qos or a reverse proxy (nginx, HAProxy) in front of Apache
# is preferred for true request-rate limiting (e.g., 1 req/s per IP).
#
# Option C: .htaccess with mod_rewrite + RewriteMap (advanced)
# RewriteEngine On
# RewriteCond %{QUERY_STRING} (period|granularity)=
# RewriteRule ^ - [E=RATE_LIMITED:1]

# --- OPTIONAL: dynamic Extended service (target/period/granularity) ---
# The Alias/<Location> above serves one static Basic-service document — it
# cannot compute a response for `?target=`/`?period=`/`?granularity=`. To
# support those, reverse-proxy to a real application that implements the
# query semantics — e.g. this repo's publisher/ gateway (or an equivalent
# implementation in any language) — rather than reconstructing that logic in
# Apache config. Replace the Alias/<Location>/ErrorDocument block above with:
#
# ProxyPreserveHost On
# ProxyPass "/.well-known/sustainability" "http://127.0.0.1:8080/.well-known/sustainability"
# ProxyPassReverse "/.well-known/sustainability" "http://127.0.0.1:8080/.well-known/sustainability"
#
# Requires: a2enmod proxy proxy_http
# The gateway already sets Content-Type, Cache-Control, ETag, CORS, and the
# correct 405/Allow per request — mod_proxy passes every upstream header
# through unmodified, so no <Location> Header directives are needed here;
# only add ones for something the gateway intentionally leaves to you (e.g.
# HSTS at the TLS-terminating layer).
#
# Verified end-to-end (2026-07-09, Apache/2.4.58 + mod_proxy_http against a
# live run of this repo's publisher gateway): query strings and all upstream
# headers pass through correctly, for both the Basic and Extended paths.
