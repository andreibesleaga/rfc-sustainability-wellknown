# Apache Configuration for /.well-known/sustainability
# Add this to your virtual host configuration (or .htaccess with AllowOverride FileInfo Headers).
# Requires: mod_headers, mod_alias, mod_rewrite (for rate limiting use mod_ratelimit or a WAF).

# --- Step 1: Map the URI to your JSON file ---
# Alias must be declared outside <Location> blocks.
Alias "/.well-known/sustainability" "/var/www/metadata/sustainability.json"

<Location "/.well-known/sustainability">
    # Mandatory: correct media type (draft §2)
    Header set Content-Type "application/json"

    # Recommended caching: 24-hour max-age for current reports (draft §4)
    Header set Cache-Control "public, max-age=86400"

    # Recommended: conditional request support to reduce bandwidth (draft §4)
    # ETag and Last-Modified are generated automatically by Apache for static files.
    # To disable ETag generation (shared hosting), uncomment:
    # FileETag None

    # Allow aggregators and third-party clients to fetch (CORS)
    Header set Access-Control-Allow-Origin "*"

    # Method restriction: only GET and HEAD are meaningful (draft §1)
    <LimitExcept GET HEAD>
        Require all denied
    </LimitExcept>
</Location>

# --- Rate Limiting (RECOMMENDED — draft §Security) ---
# Dynamic period/granularity queries can be resource-intensive.
# Option A: mod_ratelimit (limits bandwidth, not request rate — basic protection)
# <Location "/.well-known/sustainability">
#     SetOutputFilter RATE_LIMIT
#     SetEnv rate-limit 400
# </Location>
#
# Option B: mod_qos or a reverse proxy (nginx, HAProxy) in front of Apache
# is preferred for true request-rate limiting (e.g., 1 req/s per IP).
#
# Option C: .htaccess with mod_rewrite + RewriteMap (advanced)
# RewriteEngine On
# RewriteCond %{QUERY_STRING} (period|granularity)=
# RewriteRule ^ - [E=RATE_LIMITED:1]
