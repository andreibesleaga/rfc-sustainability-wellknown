# Nginx Configuration for /.well-known/sustainability
# Add this to your server block.
# Requires: standard ngx_http_core, ngx_http_headers, ngx_http_limit_req modules.

# --- Rate Limiting (RECOMMENDED — draft §Security) ---
# Define a shared zone (place this in the http {} block, outside server {}).
# Limits dynamic period/granularity queries to 1 request/second per IP, burst 5.
# limit_req_zone $binary_remote_addr zone=sust_limit:10m rate=1r/s;

location = /.well-known/sustainability {
    # Path to your sustainability JSON file
    alias /var/www/metadata/sustainability.json;

    # Mandatory: correct media type (draft §2)
    default_type application/json;

    # Recommended caching: 24-hour max-age for current reports (draft §4)
    add_header Cache-Control "public, max-age=86400";

    # Recommended: conditional request support (draft §4)
    # ETag and Last-Modified are sent automatically by nginx for static files.
    # etag on;  # (default: on)

    # Allow aggregators and third-party clients to fetch (CORS)
    add_header Access-Control-Allow-Origin "*";

    # Method restriction: only GET and HEAD are meaningful (draft §2)
    limit_except GET HEAD {
        deny all;
    }

    # Rate limiting (activate by uncommenting — requires limit_req_zone above)
    # limit_req zone=sust_limit burst=5 nodelay;
}

